name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: SAM Deploy
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.api-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-central-1

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name folio \
            --image-repositories "FolioFunction=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/${{ secrets.ECR_REPOSITORY }}" \
            --s3-bucket "${{ secrets.SAM_ARTIFACT_BUCKET }}" \
            --region eu-central-1 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "S3BucketName=${{ secrets.S3_BUCKET_NAME }}" \
              "ApiKey=${{ secrets.API_KEY }}"

      - name: Get API URL
        id: api-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name folio \
            --region eu-central-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke test
        run: ./scripts/smoke-test.sh "${{ needs.deploy.outputs.api-url }}"
        env:
          API_KEY: ${{ secrets.API_KEY }}
          GHOSTSCRIPT_PATH: /usr/bin/gs
