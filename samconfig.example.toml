# SAM configuration template for local deployments.
# Copy to `samconfig.toml` and fill in the placeholders before running `sam deploy`.
# In CI the values below are passed as CLI flags — see .github/workflows/deploy.yml.
#
# Required placeholders:
#   ACCOUNT_ID   — your 12-digit AWS account ID
#   ECR_REPO     — ECR repository name (e.g. folio)
#   PDF_BUCKET   — S3 bucket for PDF storage
#   API_KEY      — a 32+ character API key for authenticated routes

version = 0.1

[default.build.parameters]
cached   = true
parallel = true

[default.deploy.parameters]
stack_name        = "folio"
region            = "eu-central-1"
capabilities      = "CAPABILITY_IAM"
confirm_changeset = true

image_repositories  = ["FolioFunction=<ACCOUNT_ID>.dkr.ecr.eu-central-1.amazonaws.com/<ECR_REPO>"]
s3_bucket           = "folio-sam-<ACCOUNT_ID>"
parameter_overrides = "S3BucketName=<PDF_BUCKET> ApiKey=REPLACE_WITH_A_32_CHARACTER_API_KEY"
