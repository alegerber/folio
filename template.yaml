AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: folio — PDF microservice (Lambda + API Gateway)

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:
  S3BucketName:
    Type: String
    Description: Existing S3 bucket used for PDF storage

  ApiKey:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: x-api-key authentication value

  LogLevel:
    Type: String
    Default: info
    AllowedValues: [trace, debug, info, warn, error]

  SignedUrlExpirySeconds:
    Type: Number
    Default: 3600

# ── Globals ───────────────────────────────────────────────────────────────────

Globals:
  Function:
    MemorySize: 2048
    Timeout: 120
    Architectures: [x86_64]
    Environment:
      Variables:
        S3_BUCKET:                  !Ref S3BucketName
        GHOSTSCRIPT_PATH:           /usr/bin/gs
        LOG_LEVEL:                  !Ref LogLevel
        SIGNED_URL_EXPIRY_SECONDS:  !Ref SignedUrlExpirySeconds
        API_KEY:                    !Ref ApiKey

# ── Resources ─────────────────────────────────────────────────────────────────

Resources:
  FolioFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile
    Properties:
      PackageType: Image
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3BucketName
      Events:
        # Catch-all proxy route — forwards every path/method to Fastify
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
