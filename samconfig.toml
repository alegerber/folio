# SAM configuration for local deployments.
# In CI the values below are passed as CLI flags — see .github/workflows/deploy.yml.
#
# Before running `sam deploy` locally, fill in the three placeholders:
#   ACCOUNT_ID   — your 12-digit AWS account ID
#   ECR_REPO     — ECR repository name (e.g. folio)
#   PDF_BUCKET   — S3 bucket for PDF storage

version = 0.1

[default.build.parameters]
cached   = true
parallel = true

[default.deploy.parameters]
stack_name        = "folio"
region            = "eu-central-1"
capabilities      = "CAPABILITY_IAM"
confirm_changeset = true

image_repositories  = ["FolioFunction=592673560030.dkr.ecr.eu-central-1.amazonaws.com/folio"]
s3_bucket           = "folio-sam-592673560030"
parameter_overrides = "S3BucketName=folio-pdfs-592673560030"
